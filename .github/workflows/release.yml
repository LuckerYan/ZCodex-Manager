name: release

# 触发方式：
# 1. 手动触发：在 GitHub 仓库 Actions 页面选择本工作流，点击 Run workflow
# 2. 自动触发：推送形如 v* 的 tag（例如 git tag v0.1.0 && git push origin v0.1.0）
on:
  workflow_dispatch:
    inputs:
      releaseDraft:
        description: '创建为草稿 Release（需在发布页手动点 Publish 才对外可见）'
        required: false
        default: 'true'
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 构建 Windows 安装包并发布
    runs-on: windows-latest
    permissions:
      contents: write # 创建 Release 并上传资源需要写权限
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 安装 Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Cargo 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Tauri 应用并上传到 Release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 手动触发时用配置文件中的版本号生成 tag（v__VERSION__ 会被自动替换）；
          # tag 推送触发时直接使用该 tag 名。
          tagName: "${{ github.event_name == 'workflow_dispatch' && 'v__VERSION__' || github.ref_name }}"
          releaseName: "ZCode Manager ${{ github.event_name == 'workflow_dispatch' && 'v__VERSION__' || github.ref_name }}"
          releaseBody: |
            ## Windows 安装包

            - `*-setup.exe`：NSIS 安装程序（推荐）
            - `*.msi`：MSI 安装包

            请根据需要选择其中一个下载安装。
          # tag 推送 → 直接正式发布；手动触发 → 默认生成草稿，便于核对后再发布。
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' && inputs.releaseDraft == 'true' }}
          prerelease: false
